<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMERALD — Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   DESIGN TOKENS  — matches manager.html & track.html palette
   Background    : Beige  #D9D2C6
   Surface       : Espresso liquid glass
   Accent        : White  (no yellow anywhere)
   Status colors : Darkened for readable contrast on light bg
   Text defaults : Dark espresso on light surfaces
   Kitchen rule  : MAXIMUM contrast — quick scan, not reading
════════════════════════════════════════════════════════════ */
:root {
  /* Brand */
  --espresso:  #4A342A;
  --espresso-2:#6b4c3b;
  --beige:     #D9D2C6;
  --off-white: #F5F5F3;

  /* Status — all darkened for light bg readability */
  --red:    #c53030;
  --red-d:  rgba(197,48,48,0.10);
  --red-b:  rgba(197,48,48,0.24);
  --green:  #16a34a;
  --green-d:rgba(22,163,74,0.10);
  --green-b:rgba(22,163,74,0.26);
  --amber:  #b45309;
  --amber-d:rgba(180,83,9,0.10);
  --amber-b:rgba(180,83,9,0.26);
  --blue:   #1d4ed8;
  --blue-d: rgba(29,78,216,0.10);
  --blue-b: rgba(29,78,216,0.24);

  /* Backward-compat gold alias → amber (no yellow) */
  --gold:   #b45309;
  --gold-d: rgba(180,83,9,0.09);

  /* Dark text scale — used on beige/glass light surfaces */
  --w80: rgba(26,15,10,0.84);
  --w55: rgba(26,15,10,0.58);
  --w30: rgba(26,15,10,0.38);
  --w12: rgba(26,15,10,0.12);
  --w06: rgba(26,15,10,0.06);

  --r8:8px; --r12:12px; --r16:16px; --r20:20px;
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--beige);
  color: var(--w80);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SUBTLE WARM BACKGROUND ── */
.bg { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.bg-orb {
  position:absolute; border-radius:50%;
  filter:blur(200px); opacity:0.09;
  animation:drift 28s ease-in-out infinite alternate;
}
.bg-orb:nth-child(1){width:900px;height:900px;background:#4A342A;top:-250px;left:-200px;animation-duration:32s;}
.bg-orb:nth-child(2){width:700px;height:700px;background:#2d4a28;top:42%;right:-180px;animation-duration:24s;animation-delay:-12s;}
.bg-orb:nth-child(3){width:600px;height:600px;background:#4a2828;bottom:-130px;left:38%;animation-duration:28s;animation-delay:-8s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(50px,70px) scale(1.10);}}

.bg-grid {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(74,52,42,0.038) 1px,transparent 1px),
    linear-gradient(90deg,rgba(74,52,42,0.038) 1px,transparent 1px);
  background-size:64px 64px;
}

#app { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; }

/* ════════════════════════════════════════════════════════════
   NAVBAR — solid espresso, white text (matches manager)
════════════════════════════════════════════════════════════ */
.nav {
  display:flex; align-items:center; justify-content:space-between;
  height:62px; padding:0 28px;
  background: var(--espresso);
  border-bottom:1px solid rgba(255,255,255,0.12);
  box-shadow:0 2px 20px rgba(74,52,42,0.30);
  position:sticky; top:0; z-index:200; flex-shrink:0;
}

.nav-brand { display:flex; align-items:baseline; gap:14px; }

.nav-logo {
  font-family:'Playfair Display',serif;
  font-size:19px; font-weight:700;
  color:#ffffff; letter-spacing:5px;
}

.nav-role {
  font-family:'JetBrains Mono',monospace;
  font-size:9px; color:rgba(255,255,255,0.40);
  letter-spacing:2.5px; text-transform:uppercase;
  border-left:1px solid rgba(255,255,255,0.20); padding-left:12px;
}

.nav-right { display:flex; align-items:center; gap:14px; }

.nav-clock {
  font-family:'JetBrains Mono',monospace;
  font-size:12px; color:rgba(255,255,255,0.50); letter-spacing:1.5px;
}

/* Live badge — red dot stays (critical signal) */
.nav-live {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  color:rgba(255,255,255,0.82);
  background:rgba(197,48,48,0.22);
  border:1px solid rgba(197,48,48,0.40);
  padding:4px 12px; border-radius:20px; letter-spacing:1px;
  display:flex; align-items:center; gap:6px;
}
.live-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--red);
  animation:blink 2s ease-in-out infinite;
  box-shadow:0 0 6px rgba(197,48,48,0.70);
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.18;}}

/* ════════════════════════════════════════════════════════════
   LAYOUT
════════════════════════════════════════════════════════════ */
.main { flex:1; padding:26px 28px; }

.ogrid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:18px; max-width:1440px; margin:0 auto;
}

/* ════════════════════════════════════════════════════════════
   ORDER CARD — espresso liquid glass (matches manager .g)
   Left-border = status colour for instant visual scan
════════════════════════════════════════════════════════════ */
.ocard {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.26) 0%, rgba(255,255,255,0.00) 46%) top/100% 100% no-repeat,
    rgba(74,52,42,0.07);
  border:1px solid rgba(255,255,255,0.68);
  border-bottom-color:rgba(74,52,42,0.20);
  border-right-color: rgba(74,52,42,0.14);
  border-left:4px solid rgba(74,52,42,0.18);  /* status indicator */
  border-radius:var(--r20);
  backdrop-filter:blur(40px) saturate(200%) brightness(1.04);
  -webkit-backdrop-filter:blur(40px) saturate(200%) brightness(1.04);
  overflow:hidden;
  box-shadow:
    0 8px 32px rgba(74,52,42,0.10),
    0 2px 6px rgba(74,52,42,0.06),
    inset 0 2px 0 rgba(255,255,255,0.88),
    inset 0 -1px 0 rgba(74,52,42,0.07);
  transition:border-color .3s,box-shadow .3s,transform .22s,background .3s;
  display:flex; flex-direction:column;
}
.ocard:hover {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.32) 0%, rgba(255,255,255,0.00) 46%) top/100% 100% no-repeat,
    rgba(74,52,42,0.11);
  box-shadow:
    0 16px 48px rgba(74,52,42,0.14),
    0 4px 12px rgba(74,52,42,0.08),
    inset 0 2px 0 rgba(255,255,255,0.95),
    inset 0 -1px 0 rgba(74,52,42,0.10);
  transform:translateY(-2px);
}

/* Status-coded left border + subtle tint */
.ocard.preparing {
  border-left-color: var(--amber) !important;
  box-shadow:
    0 8px 32px rgba(180,83,9,0.12),
    0 2px 6px rgba(180,83,9,0.07),
    inset 0 2px 0 rgba(255,255,255,0.90) !important;
}
.ocard.all-ready {
  border-left-color: var(--green) !important;
  box-shadow:
    0 8px 32px rgba(22,163,74,0.12),
    0 2px 6px rgba(22,163,74,0.07),
    inset 0 2px 0 rgba(255,255,255,0.90) !important;
}
.ocard.all-done {
  border-left-color: var(--green) !important;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.26) 0%, rgba(255,255,255,0.00) 46%) top/100% 100% no-repeat,
    rgba(22,163,74,0.06) !important;
  box-shadow:
    0 8px 32px rgba(22,163,74,0.14),
    inset 0 2px 0 rgba(255,255,255,0.90) !important;
}
.ocard.cancelled {
  border-left-color:var(--red) !important;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.20) 0%, rgba(255,255,255,0.00) 46%) top/100% 100% no-repeat,
    rgba(197,48,48,0.07) !important;
  animation:cancelFlash 1s ease-in-out 4;
}
@keyframes cancelFlash {
  0%,100%{box-shadow:0 4px 24px rgba(197,48,48,0.14);}
  50%{box-shadow:0 4px 52px rgba(197,48,48,0.55),0 0 0 5px rgba(197,48,48,0.14);}
}

/* ── CARD HEADER ── */
.ocard-head {
  padding:18px 20px 14px;
  border-bottom:1px solid rgba(74,52,42,0.10);
  display:flex; align-items:flex-start; justify-content:space-between; gap:10px;
  background:rgba(74,52,42,0.04);
}
.ocard-head-left { flex:1; min-width:0; }

/* TABLE LABEL — Inter 900, largest, most scannable element on card */
.ocard-table {
  font-family:'Inter',sans-serif;
  font-size:28px; font-weight:900;
  color: var(--espresso);
  line-height:1; letter-spacing:-0.5px; margin-bottom:5px;
  font-variant-numeric:tabular-nums;
}

/* Customer name — clear Inter, readable muted espresso */
.ocard-customer {
  font-family:'Inter',sans-serif; font-weight:600;
  font-size:14px; color:var(--espresso-2); margin-bottom:7px;
  opacity:0.75;
}

/* Info chips */
.ocard-chips { display:flex; gap:6px; flex-wrap:wrap; }
.chip {
  font-family:'JetBrains Mono',monospace; font-size:9px;
  color:var(--blue);
  background:var(--blue-d); border:1px solid var(--blue-b);
  padding:3px 9px; border-radius:20px; letter-spacing:.8px;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
}
.chip svg { width:9px; height:9px; flex-shrink:0; }
.chip.green { color:var(--green); background:var(--green-d); border-color:var(--green-b); }
/* gold chip → amber (no yellow) */
.chip.gold  { color:var(--amber); background:var(--amber-d); border-color:var(--amber-b); }
.chip.red   { color:var(--red);   background:var(--red-d);   border-color:var(--red-b);   }

/* Overall status (top-right of card) */
.ocard-overall { display:flex; flex-direction:column; align-items:flex-end; gap:8px; flex-shrink:0; }

.ostatus {
  font-family:'Inter',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  display:flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:20px; border:1px solid;
}
.ostatus.prep  { color:var(--amber); background:var(--amber-d); border-color:var(--amber-b); }
.ostatus.ready { color:var(--green); background:var(--green-d); border-color:var(--green-b); }
.ostatus.done  {
  color:var(--green); background:rgba(22,163,74,0.16);
  border-color:var(--green-b); font-weight:800;
}
.ostatus-dot {
  width:5px; height:5px; border-radius:50%; background:currentColor;
  animation:blink 2.2s ease-in-out infinite;
}

/* ── ROUNDS CONTAINER ── */
.ocard-rounds { padding:14px 20px; display:flex; flex-direction:column; gap:12px; flex:1; }

/* Individual round panel — inner liquid glass */
.round {
  border-radius:var(--r12); padding:14px 16px;
  border:1px solid rgba(74,52,42,0.12);
  background: rgba(255,255,255,0.38);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:border-color .2s,background .2s;
}
.round.preparing { border-color:rgba(180,83,9,0.28); background:rgba(180,83,9,0.05); }
.round.ready     { border-color:rgba(22,163,74,0.28); background:rgba(22,163,74,0.05); }

/* Round header */
.round-head {
  display:flex; align-items:flex-start; justify-content:space-between;
  flex-wrap:wrap; gap:8px; margin-bottom:12px;
}
.round-head-left  { display:flex; flex-direction:column; gap:4px; }
.round-head-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; }

/* Round label — Inter 700 for readability */
.round-label {
  font-family:'Inter',sans-serif; font-size:10px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
}
.round-label.first      { color:var(--red); }
.round-label.additional { color:var(--blue); }

.round-id {
  font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--w30);
  letter-spacing:.5px; display:flex; align-items:center; gap:4px;
}
.round-id svg { width:9px; height:9px; opacity:.5; }

/* ── ROUND STATUS PILL — clickable to toggle Preparing → Ready ── */
.rstatus {
  font-family:'Inter',sans-serif; font-size:9px; font-weight:700;
  letter-spacing:1.2px; text-transform:uppercase;
  display:flex; align-items:center; gap:5px;
  padding:6px 13px; border-radius:20px; border:1.5px solid;
  transition:all .2s; white-space:nowrap;
}
.rstatus.prep {
  color:var(--amber); background:var(--amber-d); border-color:var(--amber-b);
  cursor:pointer;
}
.rstatus.prep:hover {
  background:var(--amber-b); border-color:var(--amber);
  transform:scale(1.04);
  box-shadow:0 4px 12px rgba(180,83,9,0.22);
}
.rstatus.ready {
  color:var(--green); background:var(--green-d); border-color:var(--green-b);
  cursor:default;
}
.rstatus-dot {
  width:5px; height:5px; border-radius:50%; background:currentColor;
  animation:blink 2.2s ease-in-out infinite;
}

/* Per-round KOT button */
.btn-kot-round {
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:var(--r8);
  background:rgba(74,52,42,0.07);
  border:1px solid rgba(74,52,42,0.18);
  color:var(--w55);
  font-family:'Inter',sans-serif; font-size:10px; font-weight:600;
  letter-spacing:.4px; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.btn-kot-round:hover {
  background:rgba(74,52,42,0.15);
  border-color:rgba(74,52,42,0.35);
  color:var(--espresso);
  transform:translateY(-1px);
}
.btn-kot-round svg { width:10px; height:10px; flex-shrink:0; }

/* ── ITEMS LIST ── */
.items-list {
  list-style:none;
  border-top:1px solid rgba(74,52,42,0.10);
  padding-top:10px;
}
.item-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 0; border-bottom:1px solid rgba(74,52,42,0.07);
}
.item-row:last-child { border-bottom:none; }

/* Item name — Inter 500, strong contrast for kitchen scanning */
.item-name {
  font-family:'Inter',sans-serif; font-size:14px; font-weight:500;
  color:var(--w80); flex:1; line-height:1.3;
}

/* Quantity — BIG Inter 900 for instant kitchen scan */
.item-qty {
  font-family:'Inter',sans-serif;
  font-size:22px; font-weight:900;
  color:var(--espresso);
  min-width:40px; text-align:right; line-height:1;
}
.item-qty-lbl {
  font-family:'JetBrains Mono',monospace;
  font-size:8px; color:var(--w30);
  letter-spacing:1px; text-transform:uppercase;
  text-align:right; display:block; margin-top:2px;
}

/* ── DISMISS BUTTON (×) ── */
.btn-dismiss {
  width:30px; height:30px; border-radius:50%;
  display:inline-flex; align-items:center; justify-content:center;
  border:1px solid rgba(74,52,42,0.14);
  background:rgba(74,52,42,0.04);
  color:var(--w30);
  cursor:not-allowed;
  transition:all .2s; flex-shrink:0; padding:0;
}
.btn-dismiss svg { width:12px; height:12px; flex-shrink:0; }
/* Active — when kitchenDone is true */
.btn-dismiss.dismissable {
  border-color:var(--red-b);
  background:var(--red-d);
  color:var(--red);
  cursor:pointer;
}
.btn-dismiss.dismissable:hover {
  background:var(--red-b);
  border-color:var(--red);
  transform:scale(1.12);
  box-shadow:0 4px 14px rgba(197,48,48,0.22);
}
.btn-dismiss.dismissable:active { transform:scale(0.96); }

/* ── CARD FOOTER ── */
.ocard-footer {
  padding:14px 20px;
  border-top:1px solid rgba(74,52,42,0.10);
  display:flex; gap:10px;
  background:rgba(74,52,42,0.03);
}

/* MARK DONE — most critical action, must be prominent */
.btn-mark-done {
  flex:1;
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:12px 16px; border-radius:var(--r12);
  background: var(--green);
  border:1.5px solid var(--green);
  color:#ffffff;
  font-family:'Inter',sans-serif; font-size:13px; font-weight:700;
  letter-spacing:.4px; cursor:pointer;
  transition:all .2s;
  box-shadow:0 4px 14px rgba(22,163,74,0.28);
}
.btn-mark-done:hover {
  background:#15803d;
  border-color:#15803d;
  transform:translateY(-1px);
  box-shadow:0 8px 22px rgba(22,163,74,0.38);
}
.btn-mark-done:active { transform:translateY(0); }
/* Already done state — muted */
.btn-mark-done.btn-done-already {
  background:var(--green-d);
  border-color:var(--green-b);
  color:var(--green);
  cursor:default; transform:none;
  box-shadow:none; font-weight:600;
}
.btn-mark-done svg { width:14px; height:14px; flex-shrink:0; }

/* PRINT KOT — secondary action */
.btn-print-kot {
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  padding:12px 16px; border-radius:var(--r12);
  background:rgba(74,52,42,0.07);
  border:1px solid rgba(74,52,42,0.18);
  color:var(--w55);
  font-family:'Inter',sans-serif; font-size:12px; font-weight:600;
  letter-spacing:.4px; cursor:pointer;
  transition:all .2s; white-space:nowrap;
}
.btn-print-kot:hover {
  background:rgba(74,52,42,0.15);
  border-color:rgba(74,52,42,0.35);
  color:var(--espresso);
  transform:translateY(-1px);
}
.btn-print-kot:active { transform:translateY(0); }
.btn-print-kot svg { width:13px; height:13px; flex-shrink:0; }

/* ── CANCELLED BANNER ── */
.cancelled-banner {
  display:flex; align-items:center; justify-content:center; gap:14px;
  background:var(--red);
  margin:12px 20px;
  padding:16px 20px;
  border-radius:var(--r12);
  box-shadow:0 6px 24px rgba(197,48,48,0.40);
}
.cancelled-banner-text {
  font-family:'Inter',sans-serif; font-size:18px; font-weight:900;
  color:#ffffff; letter-spacing:3px; text-transform:uppercase;
}

/* ── EMPTY STATE ── */
.empty {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; gap:14px; grid-column:1/-1;
}
.empty-ico   { font-size:48px; opacity:.20; filter:grayscale(1); }
.empty-title {
  font-family:'Playfair Display',serif; font-size:20px; font-weight:700;
  color:rgba(74,52,42,0.40); letter-spacing:1px;
}
.empty-sub {
  font-family:'JetBrains Mono',monospace; font-size:10px;
  color:rgba(74,52,42,0.32); letter-spacing:2px; text-transform:uppercase;
}

/* ── KOT PRINT (unchanged functional layer) ── */
#kotarea { display:none; }
@media print {
  body>*:not(#kotarea){ display:none!important; }
  #kotarea{ display:block!important; font-family:'Courier New',monospace; max-width:80mm; margin:0 auto; color:#000; padding:4mm; }
  .kt-brand{ text-align:center; font-size:20px; font-weight:900; letter-spacing:4px; border-bottom:2px dashed #000; padding-bottom:6px; margin-bottom:6px; }
  .kt-title{ text-align:center; font-size:14px; font-weight:700; letter-spacing:2px; margin-bottom:8px; }
  .kt-row{ display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px; }
  .kt-div{ border:none; border-top:1px dashed #000; margin:7px 0; }
  .kt-ih{ display:flex; justify-content:space-between; font-size:10px; font-weight:900; text-transform:uppercase; margin-bottom:3px; }
  .kt-ir{ display:flex; justify-content:space-between; font-size:13px; padding:2px 0; }
  .kt-ir-n{ flex:1; } .kt-ir-q{ font-weight:900; min-width:28px; text-align:right; }
  .kt-foot{ text-align:center; font-size:10px; margin-top:8px; border-top:2px dashed #000; padding-top:6px; letter-spacing:1px; }
  .kt-ts{ text-align:center; font-size:10px; color:#555; margin-top:4px; }
}

@media(max-width:768px) {
  .nav { padding:0 14px; }
  .main { padding:14px; }
  .ogrid { grid-template-columns:1fr; }
}
</style>

<!-- ═══ Firebase SDK (unchanged) ═══ -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>

<script>
setInterval(()=>{const n=new Date(),pad=x=>String(x).padStart(2,'0');document.getElementById('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;},1000);
db.ref("orders").on("value",s=>renderOrders(s.val()));

function renderOrders(data){
  const grid=document.getElementById('ogrid');
  grid.innerHTML='';
  if(!data){
    grid.innerHTML=emptyState();
    document.getElementById('liveCount').innerHTML=`<div class="live-dot"></div><span>0 active</span>`;
    return;
  }
  const allVisible=Object.values(data).filter(o=>o.status!=='Completed'&&!o.kitchenDismissed);
  const cancelled=allVisible.filter(o=>o.status==='Cancelled');
  const active=allVisible.filter(o=>o.status!=='Cancelled');
  document.getElementById('liveCount').innerHTML=`<div class="live-dot"></div><span>${active.length} active</span>`;
  if(!allVisible.length){grid.innerHTML=emptyState();return;}

  const groups={};
  active.forEach(order=>{
    const key=order.orderType==='dinein'?`T${order.tableNumber||0}`:`TKW_${order.id}`;
    if(!groups[key]){
      groups[key]={
        label:order.orderType==='dinein'?`Table ${order.tableNumber||'?'}`:'Takeaway',
        isTkw:order.orderType==='takeaway',
        customer:order.customerName||null,
        diet:order.diet||'Regular',
        orders:[]
      };
    }
    groups[key].orders.push(order);
  });
  const sortedGroups = Object.values(groups).sort((a, b) => {
    const maxA = Math.max(...a.orders.map(o => o.createdAt ? new Date(o.createdAt).getTime() : 0));
    const maxB = Math.max(...b.orders.map(o => o.createdAt ? new Date(o.createdAt).getTime() : 0));
    return maxB - maxA;
  });
  sortedGroups.forEach(grp=>{
    grp.orders.sort((a,b)=>(a.createdAt?new Date(a.createdAt).getTime():0)-(b.createdAt?new Date(b.createdAt).getTime():0));

    const anyPrep  = grp.orders.some(o=>o.status!=='Ready' && o.status!=='Done');
    const allDone  = grp.orders.length > 0 && grp.orders.every(o=>o.kitchenDone===true || o.status==='Done');
    const allOrderIds     = grp.orders.map(o=>o.id).filter(Boolean);
    const allOrderIdsJson = JSON.stringify(allOrderIds).replace(/"/g,'&quot;');

    let dietCls='blue';
    if(grp.diet==='Jain')          dietCls='gold';
    if(grp.diet==='Swaminarayan')  dietCls='green';

    const allItems  = grp.orders.flatMap(o=>Array.isArray(o.items)?o.items:(o.items&&typeof o.items==='object'?Object.values(o.items):[]));
    const totalQty  = allItems.reduce((s,i)=>s+(i.qty||1),0);

    const roundsHTML = grp.orders.map((order,ri)=>{
      const isReady  = order.status==='Ready' || order.status==='Done';
      const isFirst  = ri===0;
      const itemsArr = Array.isArray(order.items)?order.items:(order.items&&typeof order.items==='object'?Object.values(order.items):[]);
      const sid      = (order.id||'').slice(-10).toUpperCase();
      const mins     = order.createdAt ? Math.floor((Date.now()-new Date(order.createdAt).getTime())/60000) : null;
      const itemsHTML = itemsArr.map(i=>`
        <li class="item-row">
          <span class="item-name">${i.name}</span>
          <div style="text-align:right;">
            <span class="item-qty">×${i.qty}</span>
            <span class="item-qty-lbl">qty</span>
          </div>
        </li>`).join('');
      const statusPill = isReady
        ? `<div class="rstatus ready"><div class="rstatus-dot"></div>Ready</div>`
        : `<div class="rstatus prep" onclick="markReady('${order.id}')" title="Tap to mark ready"><div class="rstatus-dot"></div>Preparing</div>`;
      const kotBtn = `<button class="btn-kot-round" onclick="printKOT('${order.id}')" title="Print KOT for this round">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        KOT
      </button>`;
      return `<div class="round ${isReady?'ready':'preparing'}">
        <div class="round-head">
          <div class="round-head-left">
            <span class="round-label ${isFirst?'first':'additional'}">${isFirst?'Round 1 — Initial Order':'Round '+(ri+1)+' — Additional'}</span>
            <span class="round-id">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
              ${sid}${mins!==null?' · '+mins+'m ago':''}
            </span>
          </div>
          <div class="round-head-right">
            ${statusPill}
            ${kotBtn}
          </div>
        </div>
        <ul class="items-list">${itemsHTML||'<li class="item-row"><span class="item-name" style="color:var(--w30)">No items recorded</span></li>'}</ul>
      </div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'ocard ' + (allDone ? 'all-done' : (anyPrep ? 'preparing' : 'all-ready'));

    const statusLabel = allDone ? 'Done' : (anyPrep ? 'In Progress' : 'All Ready');
    const statusCls   = allDone ? 'done' : (anyPrep ? 'prep' : 'ready');
    const dismissCls  = allDone ? 'btn-dismiss dismissable' : 'btn-dismiss';
    const dismissTip  = allDone ? 'Remove from kitchen' : 'Mark Done first to dismiss';
    const markDoneCls = 'btn-mark-done' + (allDone ? ' btn-done-already' : '');
    const markDoneLbl = allDone ? 'Marked Done' : 'Mark Done';
    const customerRow = grp.customer ? '<div class="ocard-customer">'+grp.customer+'</div>' : '';
    card.innerHTML =
      '<div class="ocard-head">'
      +  '<div class="ocard-head-left">'
      +    '<div class="ocard-table">'+grp.label+'</div>'
      +    customerRow
      +    '<div class="ocard-chips">'
      +      '<span class="chip '+dietCls+'">'
      +        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"/><path d="M9 12l2 2 4-4"/></svg>'
      +        grp.diet
      +      '</span>'
      +      '<span class="chip">'
      +        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l3 3"/></svg>'
      +        grp.orders.length+' round'+(grp.orders.length!==1?'s':'')
      +      '</span>'
      +      '<span class="chip red">'
      +        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
      +        totalQty+' item'+(totalQty!==1?'s':'')
      +      '</span>'
      +    '</div>'
      +  '</div>'
      +  '<div class="ocard-overall">'
      +    '<div class="ostatus '+statusCls+'">'
      +      '<div class="ostatus-dot"></div>'
      +      statusLabel
      +    '</div>'
      +    '<button class="'+dismissCls+'" data-ids="'+allOrderIdsJson+'" onclick="handleDismissClick(this)" title="'+dismissTip+'">'
      +      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      +    '</button>'
      +  '</div>'
      +'</div>'
      +'<div class="ocard-rounds">'+roundsHTML+'</div>'
      +'<div class="ocard-footer">'
      +  '<button class="'+markDoneCls+'"'+(allDone?' disabled':'')+' data-ids="'+allOrderIdsJson+'" onclick="handleMarkDoneClick(this)">'
      +    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'
      +    markDoneLbl
      +  '</button>'
      +  '<button class="btn-print-kot" data-ids="'+allOrderIdsJson+'" onclick="handlePrintKOTGroupClick(this)">'
      +    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>'
      +    'Print KOT'
      +  '</button>'
      +'</div>';
    grid.appendChild(card);
  });

  // ── Cancelled orders — prominent red banner ────────────────────────────────
  const cancelGroups={};
  cancelled.forEach(order=>{
    const key=order.orderType==='dinein'?`CANC_T${order.tableNumber||0}`:`CANC_TKW_${order.id}`;
    if(!cancelGroups[key]){
      cancelGroups[key]={
        label:order.orderType==='dinein'?`Table ${order.tableNumber||'?'}`:'Takeaway',
        customer:order.customerName||null,
        orders:[]
      };
    }
    cancelGroups[key].orders.push(order);
  });
  Object.values(cancelGroups).forEach(grp=>{
    const allIds=grp.orders.map(o=>o.id).filter(Boolean);
    const allIdsJson=JSON.stringify(allIds).replace(/"/g,'&quot;');
    const customerRow=grp.customer?'<div class="ocard-customer">'+grp.customer+'</div>':'';
    const cancelCard=document.createElement('div');
    cancelCard.className='ocard cancelled';
    cancelCard.innerHTML=
      '<div class="ocard-head">'
      +  '<div class="ocard-head-left">'
      +    '<div class="ocard-table" style="color:var(--red)">'+grp.label+'</div>'
      +    customerRow
      +  '</div>'
      +  '<div class="ocard-overall">'
      +    '<div class="ostatus" style="color:var(--red);background:rgba(197,48,48,0.12);border-color:rgba(197,48,48,0.35);">'
      +      '<div class="ostatus-dot" style="background:var(--red);"></div>Cancelled'
      +    '</div>'
      +    '<button class="btn-dismiss dismissable" data-ids="'+allIdsJson+'" onclick="handleDismissClick(this)" title="Remove from kitchen">'
      +      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>'
      +    '</button>'
      +  '</div>'
      +'</div>'
      +'<div class="cancelled-banner">'
      +  '<span style="font-size:20px;">🚫</span>'
      +  '<span class="cancelled-banner-text">ORDER CANCELLED</span>'
      +  '<span style="font-size:20px;">🚫</span>'
      +'</div>';
    grid.appendChild(cancelCard);
  });
}

function emptyState(){return`<div class="empty"><div class="empty-ico">🍳</div><div class="empty-title">Kitchen is Clear</div><div class="empty-sub">No active orders</div></div>`;}

function markReady(id){db.ref("orders/"+id).update({status:"Ready"}).catch(e=>console.error(e));}

function handleMarkDoneClick(btn){
  if(btn.disabled||btn.classList.contains('btn-done-already')) return;
  const raw = btn.getAttribute('data-ids');
  if(!raw) return;
  try{ markAllDone(raw); } catch(e){ console.error(e); }
}

function handleDismissClick(btn){
  if(!btn.classList.contains('dismissable')) return;
  const raw = btn.getAttribute('data-ids');
  if(!raw) return;
  try{ dismissOrder(raw); } catch(e){ console.error(e); }
}

function handlePrintKOTGroupClick(btn){
  const raw = btn.getAttribute('data-ids');
  if(!raw) return;
  try{ printKOTGroup(raw); } catch(e){ console.error(e); }
}

// ── Clear stale ghost orders ───────────────────────────────────────────────
function clearStaleOrders(){
  if(!confirm('This will remove all orders that have no table number assigned and no items, or any order already marked Done. Real active orders will NOT be touched. Continue?')) return;
  db.ref('orders').once('value', s=>{
    const data = s.val();
    if(!data){ alert('No orders in database.'); return; }
    const toDelete = [];
    Object.entries(data).forEach(([id, o])=>{
      const hasTable  = o.tableNumber && o.tableNumber !== 0;
      const hasItems  = o.items && Object.keys(o.items).length > 0;
      const isDone    = o.status==='Done' || o.status==='Completed' || o.status==='Cancelled';
      if(isDone || (!hasTable && !hasItems)){ toDelete.push(id); }
    });
    if(!toDelete.length){ alert('No stale orders found.'); return; }
    const removes = toDelete.map(id=>db.ref('orders/'+id).remove());
    Promise.all(removes).then(()=>alert('Cleared '+toDelete.length+' stale order(s).')).catch(e=>{ console.error(e); alert('Error clearing orders.'); });
  });
}

// ── Mark Done ────────────────────────────────────────────────────────────────
function markAllDone(idsJson){
  let ids;
  try{ ids = JSON.parse(idsJson); } catch(e){ return; }
  if(!ids||!ids.length) return;
  const updates={};
  ids.forEach(id=>{
    updates["orders/"+id+"/kitchenDone"]=true;
    updates["orders/"+id+"/kitchenDoneAt"]=new Date().toISOString();
  });
  db.ref().update(updates).catch(e=>console.error(e));
  db.ref("orders/"+ids[0]).once("value", s=>{
    const o = s.val();
    if(!o || !o.tableNumber || o.orderType !== 'dinein') return;
    db.ref("tables").orderByChild("number").equalTo(o.tableNumber).once("value", ts=>{
      const tdata = ts.val();
      if(!tdata) return;
      const tkey = Object.keys(tdata)[0];
      if(tkey) db.ref("tables/"+tkey).update({ diningStatus: 'dining' });
    });
  });
}

// ── Dismiss (soft-delete from kitchen view) ──────────────────────────────────
function dismissOrder(idsJson){
  let ids;
  try{ ids = JSON.parse(idsJson); } catch(e){ return; }
  if(!ids||!ids.length) return;
  const fetches = ids.map(id=>db.ref("orders/"+id).once("value"));
  Promise.all(fetches).then(snaps=>{
    const allConfirmed = snaps.every(s=>{
      const v=s.val();
      return v && (v.kitchenDone===true || v.status==='Done');
    });
    if(!allConfirmed){ console.warn("dismissOrder: guard failed — not all rounds are done. Abort."); return; }
    const updates = {};
    ids.forEach(id => { updates["orders/"+id+"/kitchenDismissed"] = true; });
    db.ref().update(updates).catch(e=>console.error("dismissOrder update error:",e));
  }).catch(e=>console.error("dismissOrder fetch error:",e));
}

// ── Print KOT (full group) ───────────────────────────────────────────────────
function printKOTGroup(idsJson){
  let ids;
  try{ ids = JSON.parse(idsJson); } catch(e){ return; }
  if(!ids||!ids.length) return;
  const fetches = ids.map(id=>db.ref("orders/"+id).once("value"));
  Promise.all(fetches).then(snaps=>{
    const orders = snaps.map(s=>s.val()).filter(Boolean);
    if(!orders.length){alert("Orders not found.");return;}
    const first = orders[0];
    const tableLabel = first.orderType==='dinein'?`Table: ${first.tableNumber||'—'}`:'Takeaway';
    const now = new Date();
    const dtStr = now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const tmStr = now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
    const merged = {};
    orders.forEach((o,ri)=>{
      const itemsArr = Array.isArray(o.items)?o.items:(o.items&&typeof o.items==='object'?Object.values(o.items):[]);
      itemsArr.forEach(i=>{
        const key = i.name;
        if(merged[key]) merged[key].qty += (i.qty||1);
        else merged[key] = {name:i.name, qty:i.qty||1};
      });
    });
    const ih = Object.values(merged).length
      ? Object.values(merged).map(i=>`<div class="kt-ir"><span class="kt-ir-n">${i.name}</span><span class="kt-ir-q">×${i.qty}</span></div>`).join('')
      : '<div>No items</div>';
    const roundInfo = orders.length > 1 ? `${orders.length} rounds` : '1 round';
    const primaryId = (first.id||'').slice(-10).toUpperCase();
    document.getElementById('kotarea').innerHTML=`
      <div class="kt-brand">EMERALD</div>
      <div class="kt-title">— KITCHEN ORDER TICKET —</div>
      <div class="kt-row"><span><strong>Order ID:</strong></span><span>${primaryId}</span></div>
      <div class="kt-row"><span><strong>${tableLabel}</strong></span><span>${first.customerName||'—'}</span></div>
      <div class="kt-row"><span><strong>Diet:</strong></span><span>${first.diet||'Regular'}</span></div>
      <div class="kt-row"><span><strong>Type:</strong></span><span>${first.orderType==='dinein'?'Dine In':'Takeaway'} · ${roundInfo}</span></div>
      <hr class="kt-div">
      <div class="kt-ih"><span>Item</span><span>Qty</span></div>
      <hr class="kt-div">
      ${ih}
      <hr class="kt-div">
      <div class="kt-foot">*** KITCHEN COPY — FULL ORDER ***</div>
      <div class="kt-ts">${dtStr} &nbsp; ${tmStr}</div>`;
    window.print();
  }).catch(e=>{console.error(e);alert("Error fetching orders for KOT.");});
}

// ── Print KOT (single round) ─────────────────────────────────────────────────
function printKOT(id){
  db.ref("orders/"+id).once("value",s=>{
    const o=s.val();if(!o){alert("Order not found.");return;}
    const items=Array.isArray(o.items)?o.items:(o.items&&typeof o.items==='object'?Object.values(o.items):[]);
    const now=new Date();
    const tableLabel=o.orderType==='dinein'?`Table: ${o.tableNumber||'—'}`:'Takeaway';
    const dtStr=now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const tmStr=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
    const ih=items.length?items.map(i=>`<div class="kt-ir"><span class="kt-ir-n">${i.name}</span><span class="kt-ir-q">×${i.qty}</span></div>`).join(''):'<div>No items</div>';
    document.getElementById('kotarea').innerHTML=`
      <div class="kt-brand">EMERALD</div>
      <div class="kt-title">— KITCHEN ORDER TICKET —</div>
      <div class="kt-row"><span><strong>Order ID:</strong></span><span>${id}</span></div>
      <div class="kt-row"><span><strong>${tableLabel}</strong></span><span>${o.customerName||'—'}</span></div>
      <div class="kt-row"><span><strong>Diet:</strong></span><span>${o.diet||'Regular'}</span></div>
      <div class="kt-row"><span><strong>Type:</strong></span><span>${o.orderType==='dinein'?'Dine In':'Takeaway'}</span></div>
      <hr class="kt-div">
      <div class="kt-ih"><span>Item</span><span>Qty</span></div>
      <hr class="kt-div">
      ${ih}
      <hr class="kt-div">
      <div class="kt-foot">*** KITCHEN COPY ***</div>
      <div class="kt-ts">${dtStr} &nbsp; ${tmStr}</div>`;
    window.print();
  });
}
</script>

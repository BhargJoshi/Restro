<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMERALD — Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --black:#07080d;
  --s1:rgba(8,10,16,0.55);
  --s2:rgba(14,17,26,0.38);
  --s3:rgba(20,24,38,0.28);
  --border:rgba(255,255,255,0.09);
  --border-hi:rgba(255,255,255,0.16);
  --blue:#5aabf8;
  --blue-d:rgba(90,171,248,0.10);
  --green:#2dd4aa;
  --green-d:rgba(45,212,170,0.10);
  --red:#f4614f;
  --red-d:rgba(244,97,79,0.10);
  --gold:#f0b429;
  --gold-d:rgba(240,180,41,0.09);
  --w80:rgba(255,255,255,0.80);
  --w55:rgba(255,255,255,0.55);
  --w30:rgba(255,255,255,0.30);
  --w12:rgba(255,255,255,0.12);
  --w06:rgba(255,255,255,0.06);
  --r8:8px;--r12:12px;--r16:16px;--r20:20px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Space Grotesk',sans-serif;background:var(--black);color:var(--w80);min-height:100vh;overflow-x:hidden;}

.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-orb{position:absolute;border-radius:50%;filter:blur(160px);opacity:0.18;animation:drift 22s ease-in-out infinite alternate;}
.bg-orb:nth-child(1){width:800px;height:800px;background:#060f22;top:-220px;left:-200px;animation-duration:28s;}
.bg-orb:nth-child(2){width:600px;height:600px;background:#04160a;top:38%;right:-160px;animation-duration:20s;animation-delay:-11s;}
.bg-orb:nth-child(3){width:520px;height:520px;background:#180510;bottom:-110px;left:42%;animation-duration:25s;animation-delay:-7s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(55px,75px) scale(1.12);}}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px);
  background-size:64px 64px;}

#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

.nav{
  display:flex;align-items:center;justify-content:space-between;
  height:60px;padding:0 28px;
  background:rgba(7,8,13,0.5);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(40px) saturate(180%);
  -webkit-backdrop-filter:blur(40px) saturate(180%);
  position:sticky;top:0;z-index:200;flex-shrink:0;
}
.nav-brand{display:flex;align-items:baseline;gap:14px;}
.nav-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#ffffff;letter-spacing:6px;}
.nav-role{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--w30);letter-spacing:2.5px;text-transform:uppercase;border-left:1px solid var(--border-hi);padding-left:12px;}
.nav-right{display:flex;align-items:center;gap:18px;}
.nav-clock{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--w30);letter-spacing:1.5px;}
.nav-live{
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--red);
  background:rgba(244,97,79,0.08);border:1px solid rgba(244,97,79,0.18);
  padding:4px 12px;border-radius:20px;letter-spacing:1px;
  display:flex;align-items:center;gap:6px;
}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

.main{flex:1;padding:26px 28px;}

.ogrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:18px;
  max-width:1440px;margin:0 auto;
}

/* TRUE GLASS CARD — reference image inspired */
.ocard{
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.11);
  border-radius:var(--r20);
  backdrop-filter:blur(48px) saturate(160%);
  -webkit-backdrop-filter:blur(48px) saturate(160%);
  overflow:hidden;
  box-shadow:
    0 4px 24px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.08);
  transition:border-color .3s,box-shadow .3s,transform .22s;
  display:flex;
  flex-direction:column;
}
.ocard:hover{
  border-color:rgba(255,255,255,0.18);
  box-shadow:0 16px 48px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.12);
  transform:translateY(-2px);
}
.ocard.preparing{border-color:rgba(240,180,41,0.22);}
.ocard.all-ready{border-color:rgba(45,212,170,0.22);}

/* Top strip — table identity + status */
.ocard-head{
  padding:18px 20px 14px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  background:rgba(255,255,255,0.02);
}
.ocard-head-left{flex:1;min-width:0;}
.ocard-table{
  font-family:'Syne',sans-serif;font-size:26px;font-weight:800;
  color:var(--red);line-height:1;letter-spacing:-0.5px;margin-bottom:5px;
}
.ocard-customer{
  font-family:'Instrument Serif',serif;font-style:italic;
  font-size:16px;color:var(--green);margin-bottom:6px;
}
.ocard-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue);
  background:rgba(90,171,248,0.08);border:1px solid rgba(90,171,248,0.15);
  padding:3px 9px;border-radius:20px;letter-spacing:.8px;
  display:flex;align-items:center;gap:4px;white-space:nowrap;
}
.chip svg{width:9px;height:9px;flex-shrink:0;}
.chip.green{color:var(--green);background:rgba(45,212,170,0.08);border-color:rgba(45,212,170,.15);}
.chip.gold{color:var(--gold);background:rgba(240,180,41,0.08);border-color:rgba(240,180,41,.15);}
.chip.red{color:var(--red);background:rgba(244,97,79,0.08);border-color:rgba(244,97,79,.15);}

/* Overall status — top right, clickable if preparing */
.ocard-overall{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.ostatus{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;display:flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;border:1px solid;
}
.ostatus.prep{color:var(--gold);background:rgba(240,180,41,0.08);border-color:rgba(240,180,41,.18);}
.ostatus.ready{color:var(--green);background:rgba(45,212,170,0.08);border-color:rgba(45,212,170,.18);}
.ostatus-dot{width:5px;height:5px;border-radius:50%;background:currentColor;animation:blink 2.2s ease-in-out infinite;}

/* Rounds container */
.ocard-rounds{padding:14px 20px;display:flex;flex-direction:column;gap:12px;flex:1;}

/* Individual round glass panel */
.round{
  border-radius:var(--r12);padding:14px 16px;
  border:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.025);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:border-color .2s,background .2s;
}
.round.preparing{border-color:rgba(240,180,41,0.18);background:rgba(240,180,41,0.03);}
.round.ready{border-color:rgba(45,212,170,0.18);background:rgba(45,212,170,0.03);}

/* Round header — top row: label+id on left, status (clickable) on right */
.round-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-wrap:wrap;gap:8px;margin-bottom:12px;
}
.round-head-left{display:flex;flex-direction:column;gap:4px;}
.round-label{
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;
}
.round-label.first{color:var(--red);}
.round-label.additional{color:var(--blue);}
.round-id{
  font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--w30);
  letter-spacing:.5px;display:flex;align-items:center;gap:4px;
}
.round-id svg{width:9px;height:9px;opacity:.5;}

/* Status pill — clickable when preparing, becomes "Ready" */
.rstatus{
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:20px;border:1px solid;
  transition:all .2s;white-space:nowrap;
}
.rstatus.prep{
  color:var(--gold);background:rgba(240,180,41,0.08);border-color:rgba(240,180,41,.2);
  cursor:pointer;
}
.rstatus.prep:hover{
  background:rgba(240,180,41,0.18);border-color:var(--gold);
  transform:scale(1.04);
}
.rstatus.ready{color:var(--green);background:rgba(45,212,170,0.08);border-color:rgba(45,212,170,.2);cursor:default;}
.rstatus-dot{width:4px;height:4px;border-radius:50%;background:currentColor;animation:blink 2.2s ease-in-out infinite;}

/* Items list */
.items-list{list-style:none;border-top:1px solid rgba(255,255,255,0.06);padding-top:10px;}
.item-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);
}
.item-row:last-child{border-bottom:none;}
.item-name{font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--white);flex:1;}
.item-qty{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--white);min-width:36px;text-align:right;line-height:1;}
.item-qty-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--white);letter-spacing:1px;text-transform:uppercase;text-align:right;display:block;margin-top:1px;}

/* Print KOT button — bottom center of card, white */
.card-footer{
  padding:14px 20px 18px;
  border-top:1px solid rgba(255,255,255,0.07);
  display:flex;justify-content:center;
  background:rgba(255,255,255,0.02);
}
.btn-kot{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 28px;border-radius:var(--r8);
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  color:#ffffff;
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.5px;cursor:pointer;
  transition:all .2s;
  backdrop-filter:blur(10px);
}
.btn-kot:hover{
  background:rgba(255,255,255,0.14);
  border-color:rgba(255,255,255,0.3);
  transform:translateY(-1px);
}
.btn-kot svg{width:12px;height:12px;flex-shrink:0;}

/* Empty state */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:14px;grid-column:1/-1;
}
.empty-ico{font-size:48px;opacity:.2;filter:grayscale(1);}
.empty-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--w30);letter-spacing:1px;}
.empty-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--w30);opacity:.6;letter-spacing:2px;text-transform:uppercase;}

/* KOT Print */
#kotarea{display:none;}
@media print{
  body>*:not(#kotarea){display:none!important;}
  #kotarea{display:block!important;font-family:'Courier New',monospace;max-width:80mm;margin:0 auto;color:#000;padding:4mm;}
  .kt-brand{text-align:center;font-size:20px;font-weight:900;letter-spacing:4px;border-bottom:2px dashed #000;padding-bottom:6px;margin-bottom:6px;}
  .kt-title{text-align:center;font-size:14px;font-weight:700;letter-spacing:2px;margin-bottom:8px;}
  .kt-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;}
  .kt-div{border:none;border-top:1px dashed #000;margin:7px 0;}
  .kt-ih{display:flex;justify-content:space-between;font-size:10px;font-weight:900;text-transform:uppercase;margin-bottom:3px;}
  .kt-ir{display:flex;justify-content:space-between;font-size:13px;padding:2px 0;}
  .kt-ir-n{flex:1;}.kt-ir-q{font-weight:900;min-width:28px;text-align:right;}
  .kt-foot{text-align:center;font-size:10px;margin-top:8px;border-top:2px dashed #000;padding-top:6px;letter-spacing:1px;}
  .kt-ts{text-align:center;font-size:10px;color:#555;margin-top:4px;}
}

@media(max-width:768px){
  .nav{padding:0 14px;}
  .main{padding:14px;}
  .ogrid{grid-template-columns:1fr;}
}
</style>

<body>

<div class="bg"><div class="bg-orb"></div><div class="bg-orb"></div><div class="bg-orb"></div></div>
<div class="bg-grid"></div>

<div id="app">
  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-logo">EMERALD</span>
      <span class="nav-role">Kitchen Display</span>
    </div>
    <div class="nav-right">
      <div class="nav-live" id="liveCount"><div class="live-dot"></div><span>0 active</span></div>
      <div class="nav-clock" id="clock">--:--:--</div>
    </div>
  </nav>
  <main class="main">
    <div class="ogrid" id="ogrid">
      <div class="empty">
        <div class="empty-ico">🍳</div>
        <div class="empty-title">Kitchen is Ready</div>
        <div class="empty-sub">Waiting for orders</div>
      </div>
    </div>
  </main>
</div>

<div id="kotarea"></div>

<script>
setInterval(()=>{const n=new Date(),pad=x=>String(x).padStart(2,'0');document.getElementById('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;},1000);

db.ref("orders").on("value",s=>renderOrders(s.val()));

function renderOrders(data){
  const grid=document.getElementById('ogrid');
  grid.innerHTML='';
  if(!data){
    grid.innerHTML=emptyState();
    document.getElementById('liveCount').innerHTML=`<div class="live-dot"></div><span>0 active</span>`;
    return;
  }
  const active=Object.values(data).filter(o=>o.status!=='Completed'&&o.status!=='Cancelled');
  document.getElementById('liveCount').innerHTML=`<div class="live-dot"></div><span>${active.length} active</span>`;
  if(!active.length){grid.innerHTML=emptyState();return;}

  const groups={};
  active.forEach(order=>{
    const key=order.orderType==='dinein'?`T${order.tableNumber||0}`:`TKW_${order.id}`;
    if(!groups[key]){
      groups[key]={
        label:order.orderType==='dinein'?`Table ${order.tableNumber||'?'}`:'Takeaway',
        isTkw:order.orderType==='takeaway',
        customer:order.customerName||null,
        diet:order.diet||'Regular',
        orders:[]
      };
    }
    groups[key].orders.push(order);
  });

  Object.values(groups).forEach(grp=>{
    grp.orders.sort((a,b)=>(a.createdAt?new Date(a.createdAt).getTime():0)-(b.createdAt?new Date(b.createdAt).getTime():0));
    const anyPrep=grp.orders.some(o=>o.status!=='Ready');
    const card=document.createElement('div');
    card.className=`ocard ${anyPrep?'preparing':'all-ready'}`;

    let dietCls='blue';
    if(grp.diet==='Jain')dietCls='gold';
    if(grp.diet==='Swaminarayan')dietCls='green';

    const allItems=grp.orders.flatMap(o=>Array.isArray(o.items)?o.items:(o.items&&typeof o.items==='object'?Object.values(o.items):[]));
    const totalQty=allItems.reduce((s,i)=>s+(i.qty||1),0);

    /* One KOT button per card (first order's ID, or all rounds) — placed at bottom */
    const firstOrderId=grp.orders[0]?.id||'';

    const roundsHTML=grp.orders.map((order,ri)=>{
      const isReady=order.status==='Ready';
      const isFirst=ri===0;
      const itemsArr=Array.isArray(order.items)?order.items:(order.items&&typeof order.items==='object'?Object.values(order.items):[]);
      const sid=(order.id||'').slice(-10).toUpperCase();
      const mins=order.createdAt?Math.floor((Date.now()-new Date(order.createdAt).getTime())/60000):null;

      const itemsHTML=itemsArr.map(i=>`
        <li class="item-row">
          <span class="item-name">${i.name}</span>
          <div style="text-align:right;">
            <span class="item-qty">×${i.qty}</span>
            <span class="item-qty-lbl">qty</span>
          </div>
        </li>`).join('');

      /* Status pill is clickable when preparing — clicking it marks ready */
      const statusPill=isReady
        ?`<div class="rstatus ready"><div class="rstatus-dot"></div>Ready</div>`
        :`<div class="rstatus prep" onclick="markReady('${order.id}')" title="Tap to mark ready"><div class="rstatus-dot"></div>Preparing</div>`;

      return `<div class="round ${isReady?'ready':'preparing'}">
        <div class="round-head">
          <div class="round-head-left">
            <span class="round-label ${isFirst?'first':'additional'}">${isFirst?'Round 1 — Initial Order':`Round ${ri+1} — Additional`}</span>
            <span class="round-id">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
              ${sid}${mins!==null?` · ${mins}m ago`:''}
            </span>
          </div>
          ${statusPill}
        </div>
        <ul class="items-list">${itemsHTML||'<li class="item-row"><span class="item-name" style="color:var(--w30)">No items recorded</span></li>'}</ul>
      </div>`;
    }).join('');

    card.innerHTML=`
      <div class="ocard-head">
        <div class="ocard-head-left">
          <div class="ocard-table">${grp.label}</div>
          ${grp.customer?`<div class="ocard-customer">${grp.customer}</div>`:''}
          <div class="ocard-chips">
            <span class="chip ${dietCls}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"/><path d="M9 12l2 2 4-4"/></svg>
              ${grp.diet}
            </span>
            <span class="chip">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l3 3"/></svg>
              ${grp.orders.length} round${grp.orders.length!==1?'s':''}
            </span>
            <span class="chip red">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              ${totalQty} item${totalQty!==1?'s':''}
            </span>
          </div>
        </div>
        <div class="ocard-overall">
          <div class="ostatus ${anyPrep?'prep':'ready'}">
            <div class="ostatus-dot"></div>
            ${anyPrep?'In Progress':'All Ready'}
          </div>
        </div>
      </div>
      <div class="ocard-rounds">${roundsHTML}</div>
      <div class="card-footer">
        <button class="btn-kot" onclick="printKOT('${firstOrderId}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print KOT
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function emptyState(){return`<div class="empty"><div class="empty-ico">🍳</div><div class="empty-title">Kitchen is Clear</div><div class="empty-sub">No active orders</div></div>`;}

function markReady(id){db.ref("orders/"+id).update({status:"Ready"}).catch(e=>console.error(e));}

function printKOT(id){
  db.ref("orders/"+id).once("value",s=>{
    const o=s.val();if(!o){alert("Order not found.");return;}
    const items=Array.isArray(o.items)?o.items:(o.items&&typeof o.items==='object'?Object.values(o.items):[]);
    const now=new Date();
    const tableLabel=o.orderType==='dinein'?`Table: ${o.tableNumber||'—'}`:'Takeaway';
    const dtStr=now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const tmStr=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
    const ih=items.length?items.map(i=>`<div class="kt-ir"><span class="kt-ir-n">${i.name}</span><span class="kt-ir-q">×${i.qty}</span></div>`).join(''):'<div>No items</div>';
    document.getElementById('kotarea').innerHTML=`
      <div class="kt-brand">EMERALD</div>
      <div class="kt-title">— KITCHEN ORDER TICKET —</div>
      <div class="kt-row"><span><strong>Order ID:</strong></span><span>${id}</span></div>
      <div class="kt-row"><span><strong>${tableLabel}</strong></span><span>${o.customerName||'—'}</span></div>
      <div class="kt-row"><span><strong>Diet:</strong></span><span>${o.diet||'Regular'}</span></div>
      <div class="kt-row"><span><strong>Type:</strong></span><span>${o.orderType==='dinein'?'Dine In':'Takeaway'}</span></div>
      <hr class="kt-div">
      <div class="kt-ih"><span>Item</span><span>Qty</span></div>
      <hr class="kt-div">
      ${ih}
      <hr class="kt-div">
      <div class="kt-foot">*** KITCHEN COPY ***</div>
      <div class="kt-ts">${dtStr} &nbsp; ${tmStr}</div>`;
    window.print();
  });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Emerald Menu - Premium Mobile</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #ffcc00;
  --primary-dark: #cc9900;
  --bg-light: #f7f7f7;
  --text-dark: #111;
  --surface: #ffffff;
  --intro-beige: #d2b48c; 
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Inter', sans-serif;
  background-color: #111;
  color: var(--text-dark);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* --- INTRO ANIMATION --- */
#intro-wrapper {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--intro-beige);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
}
#intro-wrapper.exit { transform: translateX(-100%); }

.brand-header {
  position: absolute;
  top: 60px;
  font-family: 'Arial Black', serif;
  font-size: 32px;
  letter-spacing: 4px;
  color: #3d2b1f;
  text-transform: uppercase;
}

.animation-container {
  position: relative;
  width: 350px;
  height: 250px;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  padding-bottom: 60px;
}

.plate-side {
  width: 180px;
  height: 8px;
  background: #ffffff;
  border-radius: 0 0 15px 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  position: relative;
  z-index: 10;
  animation: slidePlate 0.7s ease-out forwards;
}

@keyframes slidePlate {
  0% { transform: translateX(100vw); }
  100% { transform: translateX(0); }
}

.falling-item { position: absolute; font-size: 40px; opacity: 0; z-index: 5; }
.item-burger { animation: dropIn 0.5s 0.8s forwards; left: 85px; }
.item-fries  { animation: dropIn 0.5s 1.1s forwards; left: 125px; }
.item-salad  { animation: dropIn 0.5s 1.4s forwards; left: 160px; }
.item-wine   { animation: dropIn 0.5s 1.7s forwards; left: 200px; } 

@keyframes dropIn {
  0% { transform: translateY(-300px); opacity: 0; }
  100% { transform: translateY(-8px); opacity: 1; }
}

.intro-text-container {
  margin-top: 20px;
  height: 50px;
  text-align: center;
  font-family: 'Times New Roman', serif;
  font-size: 24px;
  position: relative;
  width: 100%;
}

.text-msg { position: absolute; width: 100%; left: 0; opacity: 0; }
.msg-1 { animation: textFlow 2s 2.7s forwards; }
.msg-2 { animation: textFlow 2s 4.7s forwards; }

@keyframes textFlow {
  0% { opacity: 0; transform: translateX(30px); }
  20%, 80% { opacity: 1; transform: translateX(0); }
  100% { opacity: 0; transform: translateX(-30px); }
}

/* --- SIDEBAR & NESTED NAV --- */
.sidebar { 
  width: 90px;
  background: #1a1a1a; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  padding-top: 15px;
  padding-bottom: 100px;
  position: relative; 
  overflow-y: auto; 
  height: 100vh;
  border-right: 1px solid rgba(255,255,255,0.1); 
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.sidebar::-webkit-scrollbar { display: none; }

.nav-indicator { 
  position: absolute; 
  left: 10px; 
  width: 70px; 
  height: 70px; 
  background: var(--primary); 
  border-radius: 12px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
  z-index: 1; 
}

.nav-group { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 5px; }

.nav-item { 
  width: 70px; 
  height: 70px; 
  margin-bottom: 5px; 
  border-radius: 12px; 
  display: flex; 
  flex-direction: column; 
  align-items: center;
  justify-content: center; 
  cursor: pointer; 
  position: relative; 
  z-index: 2; 
  transition: color 0.3s ease; 
  color: rgba(255,255,255,0.6); 
  flex-shrink: 0; 
}

.nav-item.active { color: #000; }
.nav-item span { font-size: 22px; margin-bottom: 4px; }
.nav-item label { font-size: 9px; font-weight: 700; text-transform: uppercase; text-align: center; pointer-events: none; }

/* Submenu Styling */
.submenu {
  width: 100%;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease-out;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(255, 204, 0, 0.07);
  border-left: 2px solid rgba(255, 204, 0, 0.18);
  border-right: 2px solid rgba(255, 204, 0, 0.18);
  border-radius: 0 0 10px 10px;
}

.nav-group.expanded .submenu { max-height: 700px; padding-bottom: 10px; }

.sub-item {
  width: 60px;
  height: 55px;
  margin-top: 8px;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 2;
  color: rgba(255,255,255,0.55);
  transition: all 0.3s ease;
  background: rgba(255,255,255,0.04);
}

.sub-item.active { color: #000; }
.sub-item span { font-size: 16px; }
.sub-item label { font-size: 7px; font-weight: 600; text-transform: uppercase; margin-top: 2px; pointer-events: none; }

/* --- MAIN CONTENT --- */
.main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-light); border-top-left-radius: 25px; overflow: hidden; }
.hero-header { padding: 15px 20px; background: #fff; border-bottom: 1px solid #eee; text-align: center; position: relative; display: flex; align-items: center; justify-content: center; }
#section-name { font-family: 'Playfair Display', serif; font-size: 16px; background: var(--primary); color: #000; display: inline-block; padding: 5px 12px; border-radius: 8px; box-shadow: 0 4px 10px rgba(255, 204, 0, 0.2); }

.search-container { position: absolute; right: 15px; display: flex; align-items: center; }
#search-input { width: 0; opacity: 0; padding: 8px 0; border: none; border-bottom: 2px solid var(--primary); outline: none; transition: all 0.3s ease; font-size: 14px; }
#search-input.active { width: 120px; opacity: 1; padding: 8px 10px; margin-right: 5px; }
.search-icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; }

.menu-container { flex: 1; overflow-y: auto; padding: 12px; padding-bottom: 100px; }
.items-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

.food-card { background: #fff; border-radius: 16px; padding: 8px; display: flex; flex-direction: column; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.food-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; margin-bottom: 8px; }
.food-card h4 { font-size: 12px; line-height: 1.2; margin-bottom: 4px; height: 32px; overflow: hidden; }
.price { font-weight: 700; color: #555; font-size: 14px; margin-bottom: 8px; }

.cart-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  background: #ff4444;
  color: white;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 10px;
  border: 2px solid white;
  display: none;
  z-index: 15;
}

.add-initial { width: 100%; padding: 8px; background: #111; color: #fff; border: none; border-radius: 8px; font-weight: 600; font-size: 12px; cursor: pointer; }
.qty-controls { display: none; align-items: center; justify-content: space-between; background: #f0f0f0; border-radius: 8px; padding: 2px; }
.btn-qty { width: 28px; height: 28px; border: none; background: #fff; border-radius: 6px; font-weight: 700; cursor: pointer; }

.cart-bar { position: fixed; bottom: 15px; left: 105px; right: 15px; background: #28a745; height: 50px; border-radius: 12px; display: none; align-items: center; justify-content: space-between; padding: 0 15px; color: #fff; font-weight: 700; z-index: 1000; cursor: pointer; }
.cart-popup { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: flex-end; z-index: 2000; }
.cart-content { width: 100%; max-width: 500px; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; max-height: 80vh; overflow-y: auto; }

.cart-item-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
.cart-item-info { flex: 1; }
.cart-item-info h5 { font-size: 14px; margin-bottom: 2px; }
.cart-item-info p { font-size: 12px; color: #777; }
.cart-item-actions { display: flex; align-items: center; gap: 10px; }

.pay-btn { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; margin-top: 20px; cursor: pointer; }

/* --- ORDER CONFIRMATION OVERLAY --- */
#order-confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9000;
}
#order-confirm-overlay.visible { display: flex; }
.order-confirm-box {
  background: #fff;
  border-radius: 24px;
  padding: 40px 30px;
  text-align: center;
  width: 85%;
  max-width: 340px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
@keyframes popIn {
  0% { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.order-confirm-icon { font-size: 52px; margin-bottom: 12px; }
.order-confirm-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #111; margin-bottom: 20px; }
.order-timer-ring {
  position: relative;
  width: 130px;
  height: 130px;
  margin: 0 auto 20px;
}
.order-timer-ring svg { transform: rotate(-90deg); }
.timer-track { fill: none; stroke: #f0f0f0; stroke-width: 8; }
.timer-progress {
  fill: none;
  stroke: #28a745;
  stroke-width: 8;
  stroke-linecap: round;
  stroke-dasharray: 339.29;
  stroke-dashoffset: 0;
  transition: stroke-dashoffset 1s linear;
}
.timer-label {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 800;
  color: #111;
}
.order-ready-text {
  font-size: 15px;
  color: #555;
  font-weight: 600;
  margin-bottom: 24px;
}
.order-confirm-close {
  background: #111;
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 12px 32px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
#order-ready-banner {
  display: none;
  margin-bottom: 18px;
  animation: readyPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}
#order-ready-banner.visible { display: block; }
.order-ready-badge {
  background: #28a745;
  color: #fff;
  font-size: 20px;
  font-weight: 800;
  padding: 10px 24px;
  border-radius: 50px;
  display: inline-block;
  letter-spacing: 0.5px;
}
@keyframes readyPop {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.token-box {
  background: #fff8e1;
  border: 2px dashed #ffcc00;
  border-radius: 12px;
  padding: 10px 18px;
  margin: 0 auto 20px;
  display: inline-block;
  text-align: center;
}
.token-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  color: #888;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
}
.token-number {
  font-size: 28px;
  font-weight: 800;
  color: #111;
  letter-spacing: 3px;
  font-family: 'Courier New', monospace;
}
</style>
</head>
<body>

<div id="intro-wrapper">
  <div class="brand-header">EMERALD</div>
  <div class="animation-container">
    <div class="plate-side"></div>
    <div class="falling-item item-burger">🍔</div>
    <div class="falling-item item-fries">🍟</div>
    <div class="falling-item item-salad">🥗</div>
    <div class="falling-item item-wine">🍷</div>
  </div>
  <div class="intro-text-container">
    <div class="text-msg msg-1">Prioritizing Taste</div>
    <div class="text-msg msg-2">Serving With Speed</div>
  </div>
</div>

<div class="sidebar" id="sidebar">
  <div class="nav-indicator" id="nav-indicator"></div>

  <!-- 1. Starters -->
  <div class="nav-group expanded" id="group-starters">
    <div class="nav-item active" onclick="toggleGroup('starters', this)">
      <span>🍢</span><label>Starters</label>
    </div>
    <div class="submenu">
      <div class="sub-item" onclick="showSection('starters', this)"><span>🍽️</span><label>Indian</label></div>
      <div class="sub-item" onclick="showSection('snacks', this)"><span>🍕</span><label>Snacks</label></div>
      <div class="sub-item" onclick="showSection('salads', this)"><span>🥗</span><label>Salads</label></div>
    </div>
  </div>

  <!-- 2. Main Course -->
  <div class="nav-group" id="group-main">
    <div class="nav-item" onclick="toggleGroup('main', this)">
      <span>🍖</span><label>Main</label>
    </div>
    <div class="submenu">
      <div class="sub-item" onclick="showSection('paneer', this)"><span>🧀</span><label>Paneer</label></div>
      <div class="sub-item" onclick="showSection('indian_curry', this)"><span>🍛</span><label>Curries</label></div>

    </div>
  </div>

  <!-- 3. Breads -->
  <div class="nav-group" id="group-breads">
    <div class="nav-item" onclick="toggleGroup('breads', this)">
      <span>🫓</span><label>Breads</label>
    </div>
    <div class="submenu">
      <div class="sub-item" onclick="showSection('tandoor', this)"><span>🔥</span><label>Tandoor</label></div>
      <div class="sub-item" onclick="showSection('kofta', this)"><span>🧆</span><label>Kofta</label></div>
    </div>
  </div>

  <!-- Chinese (Merged) -->
  <div class="nav-group">
    <div class="nav-item" onclick="showSection('chinese_merged', this)"><span>🍜</span><label>Chinese</label></div>
  </div>

  <!-- 5. Soups & Accompaniments -->
  <div class="nav-group" id="group-soups">
    <div class="nav-item" onclick="toggleGroup('soups', this)">
      <span>🥣</span><label>Soups</label>
    </div>
    <div class="submenu">
      <div class="sub-item" onclick="showSection('soups', this)"><span>🍲</span><label>Soups</label></div>
    </div>
  </div>

  <!-- Sizzlers -->
  <div class="nav-group">
    <div class="nav-item" onclick="showSection('sizzlers', this)"><span>🍳</span><label>Sizzlers</label></div>
  </div>

  <!-- Continental -->
  <div class="nav-group">
    <div class="nav-item" onclick="showSection('continental', this)"><span>🍝</span><label>Continental</label></div>
  </div>

  <!-- 6. Beverages & Desserts -->
  <div class="nav-group" id="group-beverages">
    <div class="nav-item" onclick="toggleGroup('beverages', this)">
      <span>🥤</span><label>Drinks</label>
    </div>
    <div class="submenu">
      <div class="sub-item" onclick="showSection('drinks', this)"><span>🍷</span><label>Beverages</label></div>
      <div class="sub-item" onclick="showSection('shakes', this)"><span>🥛</span><label>Shakes</label></div>
      <div class="sub-item" onclick="showSection('ice_cream', this)"><span>🍦</span><label>Desserts</label></div>
    </div>
  </div>

</div>

<div class="main-content">
  <div class="hero-header">
    <h1 id="section-name">Starters</h1>
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search item..." oninput="handleSearch()">
      <button class="search-icon-btn" onclick="toggleSearch()">🔍</button>
    </div>
  </div>
  <div class="menu-container"><div class="items-grid" id="menu-grid"></div></div>
</div>

<div class="cart-bar" id="cart-bar" onclick="toggleCart()">
  <span id="cart-item-count">0 Items</span>
  <span id="cart-total-price">₹0.00</span>
  <span>View Cart →</span>
</div>

<div class="cart-popup" id="cart-popup">
  <div class="cart-content">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px">
      <h3>Your Basket</h3>
      <button onclick="toggleCart()" style="background:none; border:none; color:#999; font-size:20px">✕</button>
    </div>
    <div id="cart-items-list"></div>
    <div style="background: #f9f9f9; padding: 15px; border-radius: 12px; margin-top: 15px;">
      <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 20px;">
        <span>Total</span><span id="cart-total-price-popup">₹0.00</span>
      </div>
    </div>
    <button class="pay-btn" onclick="processPayment()">Place Order</button>
  </div>
</div>

<!-- ORDER CONFIRMATION OVERLAY -->
<div id="order-confirm-overlay">
  <div class="order-confirm-box">
    <div class="order-confirm-icon">🍽️</div>
    <div class="order-confirm-title">Order Placed!</div>
    <div style="text-align:center; margin-bottom: 18px;">
      <div class="token-box">
        <div class="token-label">🎫 Your Token Number</div>
        <div class="token-number" id="order-token-number">#---</div>
      </div>
    </div>
    <div class="order-timer-ring">
      <svg width="130" height="130" viewBox="0 0 130 130">
        <circle class="timer-track" cx="65" cy="65" r="54"/>
        <circle class="timer-progress" id="timer-progress-circle" cx="65" cy="65" r="54"/>
      </svg>
      <div class="timer-label" id="timer-display">15:00</div>
    </div>
    <div class="order-ready-text" id="order-ready-subtext">Your order will be ready in 15 minutes</div>
    <div id="order-ready-banner"><span class="order-ready-badge">🍴 Order Ready !</span></div>
    <button class="order-confirm-close" onclick="closeOrderConfirm()">Got it!</button>
  </div>
</div>

    { id: 'ic10', name: 'Chocolate Ice Cream',          price: 90.00,  img: 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=400' },
    { id: 'ic11', name: 'Fruit Salad with Ice Cream',   price: 140.00, img: 'https://images.unsplash.com/photo-1568702846914-96b305d2aaeb?w=400' },
    { id: 'ic12', name: 'American Nut',                 price: 99.00,  img: 'https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=400' }
  ]
};

let cart = {};

window.onload = () => {
  setTimeout(() => {
    document.getElementById('intro-wrapper').classList.add('exit');
    const firstSubItem = document.querySelector('.sub-item');
    showSection('starters', firstSubItem);
  }, 5500);
};

function moveIndicator(el) {
  const indicator = document.getElementById('nav-indicator');
  const sidebar = document.getElementById('sidebar');
  const rect = el.getBoundingClientRect();
  const sidebarRect = sidebar.getBoundingClientRect();
  const relativeTop = rect.top - sidebarRect.top + sidebar.scrollTop;
  indicator.style.top = `${relativeTop}px`;
  indicator.style.height = `${rect.height}px`;
  indicator.style.width = `${rect.width}px`;
  indicator.style.left = `${el.offsetLeft}px`;
}

let _togglePendingTimer = null;

function toggleGroup(groupId, el) {
  triggerHaptic();

  // Cancel any in-flight delayed indicator move so rapid taps don't glitch
  if (_togglePendingTimer !== null) {
    clearTimeout(_togglePendingTimer);
    _togglePendingTimer = null;
  }

  const allGroups = document.querySelectorAll('.nav-group');
  const clickedGroup = el.closest('.nav-group');
  const isExpanded = clickedGroup.classList.contains('expanded');

  allGroups.forEach(g => g.classList.remove('expanded'));

  if (!isExpanded) {
    // Opening: expand group, then after animation settle move indicator to first sub-item
    clickedGroup.classList.add('expanded');
    _togglePendingTimer = setTimeout(() => {
      _togglePendingTimer = null;
      // Only move to sub-item if the group is still expanded (user didn't close it in the meantime)
      if (clickedGroup.classList.contains('expanded')) {
        const firstSub = clickedGroup.querySelector('.sub-item');
        if (firstSub) {
          const sectionName = firstSub.getAttribute('onclick').match(/'([^']+)'/)[1];
          showSection(sectionName, firstSub);
        } else {
          moveIndicator(el);
        }
      } else {
        // Group was closed before timer fired — point indicator at the parent nav-item
        moveIndicator(el);
      }
    }, 400);
  } else {
    // Closing: indicator moves to the parent nav-item immediately, no delay
    moveIndicator(el);
  }
}

function showSection(section, el) {
  triggerHaptic();
  const grid = document.getElementById('menu-grid');
  const nameDisplay = document.getElementById('section-name');
  const menuContainer = document.querySelector('.menu-container');
  document.querySelectorAll('.nav-item, .sub-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  moveIndicator(el);
  nameDisplay.innerText = section.replace(/_/g, ' ').toUpperCase().replace('Merged', '');
  const items = menuData[section] || [];
  grid.innerHTML = items.map(item => `
    <div class="food-card">
      <div class="cart-badge" id="badge-${item.id}">0</div>
      <img src="${item.img}" alt="${item.name}">
      <h4>${item.name}</h4>
      <div class="price">&#8377;${item.price.toFixed(2)}</div>
      <button class="add-initial" id="add-btn-${item.id}" onclick="addToCart('${section}', '${item.id}')">ADD</button>
      <div class="qty-controls" id="qty-ctrl-${item.id}">
        <button class="btn-qty" onclick="updateQty('${item.id}', -1)">-</button>
        <span id="qty-val-${item.id}">0</span>
        <button class="btn-qty" onclick="updateQty('${item.id}', 1)">+</button>
      </div>
    </div>
  `).join('');
  menuContainer.scrollTop = 0;
  syncCartUI();
}

function addToCart(sec, id) {
  triggerHaptic();
  let item;
  if (sec === 'search') {
    Object.values(menuData).forEach(cat => {
      const found = cat.find(i => i.id === id);
      if (found) item = found;
    });
  } else {
    item = menuData[sec].find(i => i.id === id);
  }
  if (item && !cart[id]) cart[id] = { ...item, qty: 1 };
  syncCartUI();
}

function updateQty(id, delta) {
  triggerHaptic();
  if (cart[id]) {
    cart[id].qty += delta;
    if (cart[id].qty <= 0) delete cart[id];
  }
  syncCartUI();
}

function syncCartUI() {
  let totalItems = 0;
  let subtotal = 0;
  document.querySelectorAll('.add-initial').forEach(b => b.style.display = 'block');
  document.querySelectorAll('.qty-controls').forEach(c => c.style.display = 'none');
  document.querySelectorAll('.cart-badge').forEach(b => b.style.display = 'none');
  const cartList = document.getElementById('cart-items-list');
  cartList.innerHTML = '';
  Object.keys(cart).forEach(id => {
    const item = cart[id];
    totalItems += item.qty;
    subtotal += item.price * item.qty;
    const addBtn = document.getElementById(`add-btn-${id}`);
    const qtyCtrl = document.getElementById(`qty-ctrl-${id}`);
    const qtyVal = document.getElementById(`qty-val-${id}`);
    const badge = document.getElementById(`badge-${id}`);
    if (addBtn) {
      addBtn.style.display = 'none';
      qtyCtrl.style.display = 'flex';
      qtyVal.innerText = item.qty;
      badge.style.display = 'block';
      badge.innerText = item.qty;
    }
    cartList.innerHTML += `
      <div class="cart-item-row">
        <div class="cart-item-info">
          <h5>${item.name}</h5>
          <p>&#8377;${(item.price * item.qty).toFixed(2)}</p>
        </div>
        <div class="cart-item-actions">
           <button class="btn-qty" onclick="updateQty('${item.id}', -1)">-</button>
           <span style="font-weight:700">${item.qty}</span>
           <button class="btn-qty" onclick="updateQty('${item.id}', 1)">+</button>
        </div>
      </div>
    `;
  });
  const bar = document.getElementById('cart-bar');
  if (totalItems > 0) {
    bar.style.display = 'flex';
    document.getElementById('cart-item-count').innerText = `${totalItems} Items`;
    document.getElementById('cart-total-price').innerText = `₹${subtotal.toFixed(2)}`;
    document.getElementById('cart-total-price-popup').innerText = `₹${subtotal.toFixed(2)}`;
  } else {
    bar.style.display = 'none';
    cartList.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">Your basket is empty</p>';
  }
}

function toggleCart() {
  const p = document.getElementById('cart-popup');
  p.style.display = (p.style.display === 'flex') ? 'none' : 'flex';
}

function toggleSearch() {
  document.getElementById('search-input').classList.toggle('active');
}

function triggerHaptic() { if (window.navigator.vibrate) window.navigator.vibrate(10); }

let orderTimerInterval = null;
const TOTAL_SECONDS = 15 * 60;
const CIRCUMFERENCE = 2 * Math.PI * 54;

function processPayment() {
  cart = {};
  syncCartUI();
  toggleCart();
  showOrderConfirm();
}

function showOrderConfirm() {
  const overlay = document.getElementById('order-confirm-overlay');
  document.getElementById('order-ready-subtext').style.display = 'block';
  document.getElementById('order-ready-banner').classList.remove('visible');
  const token = Math.floor(100 + Math.random() * 900);
  document.getElementById('order-token-number').textContent = '#' + token;
  overlay.classList.add('visible');
  startOrderTimer();
}

function closeOrderConfirm() {
  const overlay = document.getElementById('order-confirm-overlay');
  overlay.classList.remove('visible');
  if (orderTimerInterval) { clearInterval(orderTimerInterval); orderTimerInterval = null; }
}

function startOrderTimer() {
  if (orderTimerInterval) { clearInterval(orderTimerInterval); }
  let secondsLeft = TOTAL_SECONDS;
  const display = document.getElementById('timer-display');
  const circle = document.getElementById('timer-progress-circle');
  circle.style.strokeDasharray = CIRCUMFERENCE;
  circle.style.strokeDashoffset = 0;

  function updateTimer() {
    const mins = Math.floor(secondsLeft / 60);
    const secs = secondsLeft % 60;
    display.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
    const progress = (TOTAL_SECONDS - secondsLeft) / TOTAL_SECONDS;
    circle.style.strokeDashoffset = CIRCUMFERENCE * progress;
    if (secondsLeft <= 0) {
      clearInterval(orderTimerInterval);
      orderTimerInterval = null;
      display.textContent = '00:00';
      circle.style.strokeDashoffset = CIRCUMFERENCE;
      document.getElementById('order-ready-subtext').style.display = 'none';
      const banner = document.getElementById('order-ready-banner');
      banner.classList.add('visible');
    } else {
      secondsLeft--;
    }
  }

  updateTimer();
  orderTimerInterval = setInterval(updateTimer, 1000);
}

function handleSearch() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const grid = document.getElementById('menu-grid');
  let allItems = [];
  Object.values(menuData).forEach(cat => allItems = [...allItems, ...cat]);
  const filtered = allItems.filter(i => i.name.toLowerCase().includes(query));
  if (query === "") {
    const activeItem = document.querySelector('.nav-item.active, .sub-item.active');
    if (activeItem) {
      const onclickAttr = activeItem.getAttribute('onclick');
      const match = onclickAttr.match(/'([^']+)'/);
      if (match) showSection(match[1], activeItem);
    }
    return;
  }
  grid.innerHTML = filtered.map(item => `
    <div class="food-card">
      <div class="cart-badge" id="badge-${item.id}">${cart[item.id] ? cart[item.id].qty : 0}</div>
      <img src="${item.img}" alt="${item.name}">
      <h4>${item.name}</h4>
      <div class="price">&#8377;${item.price.toFixed(2)}</div>
      <button class="add-initial" id="add-btn-${item.id}" onclick="addToCart('search', '${item.id}')" style="display: ${cart[item.id] ? 'none' : 'block'}">ADD</button>
      <div class="qty-controls" id="qty-ctrl-${item.id}" style="display: ${cart[item.id] ? 'flex' : 'none'}">
        <button class="btn-qty" onclick="updateQty('${item.id}', -1)">-</button>
        <span id="qty-val-${item.id}">${cart[item.id] ? cart[item.id].qty : 0}</span>
        <button class="btn-qty" onclick="updateQty('${item.id}', 1)">+</button>
      </div>
    </div>
  `).join('');
}
</script>
